version: "3.9"

services:

  db:
    image: postgis/postgis:16-3.4
    container_name: fcd_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fcd
      POSTGRES_USER:     fcd_admin
      POSTGRES_PASSWORD: fcd_password
    ports:
      - "5432:5432"
    volumes:
      - fcd_db_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcd_admin -d fcd"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fcd_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: ../backend
    container_name: fcd_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fcd_admin:fcd_password@db:5432/fcd
      REDIS_URL:    redis://redis:6379/0
      GEE_PROJECT_ID: ${GEE_PROJECT_ID}
      GCS_BUCKET:     ${GCS_BUCKET}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../backend/app:/app/app

  worker:
    build: ../backend
    container_name: fcd_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://fcd_admin:fcd_password@db:5432/fcd
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      - api
      - redis

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    container_name: fcd_titiler
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORKERS_PER_CORE: "1"
      LOG_LEVEL: warning

  pg_tileserv:
    image: pramsey/pg_tileserv
    container_name: fcd_pg_tileserv
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fcd_admin:fcd_password@db:5432/fcd
    ports:
      - "7800:7800"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ../frontend
    container_name: fcd_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL:         http://localhost:8000
      NEXT_PUBLIC_TITILER_URL:     http://localhost:8080
      NEXT_PUBLIC_VECTOR_TILE_URL: http://localhost:7800
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  fcd_db_data:
