name: "FCD Task Monitor and DB Ingest"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 1-15 3 *"   # Every 2 hrs in the first 15 days of March

jobs:
  monitor-and-ingest:
    name: "Monitor GEE tasks and ingest to PostGIS"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gee/requirements.txt

      - name: Install dependencies
        run: pip install -r gee/requirements.txt

      - name: Monitor and ingest
        working-directory: gee
        env:
          GEE_SERVICE_ACCOUNT_KEY:   ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          GEE_PROJECT_ID:            ${{ secrets.GEE_PROJECT_ID }}
          GEE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GEE_SERVICE_ACCOUNT_EMAIL }}
          GCS_BUCKET:                ${{ secrets.GCS_BUCKET }}
          DATABASE_URL:              ${{ secrets.DATABASE_URL }}
        run: python monitor_and_ingest.py
