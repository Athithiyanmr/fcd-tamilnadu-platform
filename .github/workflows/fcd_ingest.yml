name: "FCD Release URL Ingest (manual re-run)"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to re-ingest (e.g. fcd-2025)"
        required: true
        default: "fcd-2025"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gee/requirements.txt

      - run: pip install -r gee/requirements.txt

      - name: Ingest release URLs into PostGIS
        working-directory: gee
        env:
          GITHUB_REPO:  ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ingest_release_urls.py "${{ github.event.inputs.release_tag }}"
